<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Fondo radial desde centro-superior -->
    <radialGradient id="bgFinal" cx="45%" cy="35%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2a1f4a"/>
      <stop offset="40%"  stop-color="#160e32"/>
      <stop offset="100%" stop-color="#070410"/>
    </radialGradient>

    <!-- Specular highlight esquina superior izquierda -->
    <radialGradient id="bgShine" cx="25%" cy="18%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(180,160,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(180,160,255,0)"/>
    </radialGradient>

    <!-- Iris: blanco puro arriba → violeta saturado abajo -->
    <linearGradient id="irisGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,250,255,0.98)"/>
      <stop offset="45%"  stop-color="rgba(210,195,255,0.92)"/>
      <stop offset="100%" stop-color="rgba(110,85,220,0.88)"/>
    </linearGradient>

    <!-- Aura exterior: lavanda → transparente -->
    <linearGradient id="auraGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(160,140,240,0.45)"/>
      <stop offset="100%" stop-color="rgba(80,60,180,0.15)"/>
    </linearGradient>

    <!-- Núcleo: blanco cálido con gradiente suave -->
    <radialGradient id="coreGrad" cx="38%" cy="32%" r="60%">
      <stop offset="0%"   stop-color="rgba(255,255,255,1)"/>
      <stop offset="70%"  stop-color="rgba(235,225,255,0.97)"/>
      <stop offset="100%" stop-color="rgba(200,185,255,0.9)"/>
    </radialGradient>

    <!-- Sombra exterior violeta profundo -->
    <filter id="shadowFinal" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="28" flood-color="#4020a0" flood-opacity="0.55"/>
    </filter>

    <!-- Glow del iris -->
    <filter id="irisGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow del núcleo -->
    <filter id="coreGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ── SQUIRCLE: superelipse (fondo) ── -->
  <path
    d="M 128 4 C 168 4, 252 4, 252 44 C 252 84, 252 172, 252 128 C 252 168, 252 252, 212 252 C 172 252, 84 252, 128 252 C 88 252, 4 252, 4 212 C 4 172, 4 84, 4 128 C 4 88, 4 4, 44 4 C 84 4, 88 4, 128 4 Z"
    fill="url(#bgFinal)"
    filter="url(#shadowFinal)"
  />

  <!-- Specular overlay -->
  <path
    d="M 128 4 C 168 4, 252 4, 252 44 C 252 84, 252 172, 252 128 C 252 168, 252 252, 212 252 C 172 252, 84 252, 128 252 C 88 252, 4 252, 4 212 C 4 172, 4 84, 4 128 C 4 88, 4 4, 44 4 C 84 4, 88 4, 128 4 Z"
    fill="url(#bgShine)"
  />

  <!-- Borde interior del squircle -->
  <path
    d="M 128 5.5 C 167 5.5, 250 5.5, 250 44.5 C 250 83, 250 170, 250 128 C 250 167, 250 250, 211 250 C 172 250, 86 250, 128 250 C 89 250, 6 250, 6 211 C 6 172, 6 86, 6 128 C 6 89, 6 6, 45 6 C 84 6, 89 6, 128 5.5 Z"
    fill="none"
    stroke="rgba(140,110,255,0.35)"
    stroke-width="1.5"
  />

  <!-- ── AURA EXTERIOR ── -->
  <circle cx="128" cy="128" r="95" stroke="url(#auraGrad)" stroke-width="5.5" fill="none"/>

  <!-- ── IRIS ── -->
  <circle
    cx="128" cy="128" r="58"
    stroke="url(#irisGrad)"
    stroke-width="14"
    fill="none"
    filter="url(#irisGlow)"
  />

  <!-- Highlight arco superior del iris -->
  <path
    d="M 80 95 A 58 58 0 0 1 176 95"
    stroke="rgba(255,255,255,0.4)"
    stroke-width="3.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- ── HALO DEL NÚCLEO ── -->
  <circle cx="128" cy="128" r="30" fill="rgba(160,130,255,0.12)" filter="url(#coreGlow)"/>

  <!-- ── NÚCLEO ── -->
  <circle cx="128" cy="128" r="20" fill="url(#coreGrad)"/>

  <!-- Especular del núcleo: reflejo principal -->
  <circle cx="120" cy="120" r="7" fill="rgba(255,255,255,0.7)"/>

  <!-- Especular del núcleo: reflejo secundario -->
  <circle cx="135" cy="136" r="3" fill="rgba(255,255,255,0.2)"/>

</svg>
