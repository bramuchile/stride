name: Release Stride

on:
  push:
    tags:
      - 'v*'  # Se activa con tags: v1.0.0, v1.2.3, etc.

jobs:
  release:
    permissions:
      contents: write  # necesario para crear releases en GitHub

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Debug signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "ERROR: TAURI_SIGNING_PRIVATE_KEY está vacío o no existe"
          else
            echo "OK: TAURI_SIGNING_PRIVATE_KEY tiene ${#TAURI_SIGNING_PRIVATE_KEY} caracteres"
            echo "Primeros 30 chars: ${TAURI_SIGNING_PRIVATE_KEY:0:30}"
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "INFO: TAURI_SIGNING_PRIVATE_KEY_PASSWORD está vacío"
          else
            echo "OK: TAURI_SIGNING_PRIVATE_KEY_PASSWORD tiene ${#TAURI_SIGNING_PRIVATE_KEY_PASSWORD} caracteres"
          fi

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Stride ${{ github.ref_name }}'
          releaseBody: |
            ## Cambios en esta versión
            Ver commits para el detalle completo.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
          
